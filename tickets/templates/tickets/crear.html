<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Ticket</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        select, textarea, input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .top-bar {
            background: #2a5298;
            color: white;
            padding: 10px;
            text-align: right;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }
    </style>
</head>
<body>

<div class="top-bar">
    Usuario: {{ request.user.username }}
    <a href="{% url 'logout' %}">Cerrar sesión</a>
</div>

<div class="container">
    <h2>Crear Ticket</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Categoría</label>
        <select name="categoria" id="categoria">
			<option value="" disabled selected>Seleccione categoría</option>
			
            {% for c in categorias %}
                <option value="{{ c.id }}">{{ c.nombre }}</option>
            {% endfor %}
        </select>

        <label>Subcategoría</label>
		<select name="subcategoria" id="subcategoria">
			<option value="">Seleccione una categoría primero</option>
		</select>

        <label>Descripción</label>
        <textarea name="descripcion"></textarea>

		<label>Adjuntar archivo</label>
		<input type="file" name="archivo">
		
        <button type="submit">Crear Ticket</button>
    </form>
</div>
<script>
document.addEventListener('DOMContentLoaded', function () {

    const categoriaSelect = document.getElementById('categoria');
    const subcategoriaSelect = document.getElementById('subcategoria');

    function cargarSubcategorias() {
        let categoriaId = categoriaSelect.value;
		
		if (!categoriaId) {
			subcategoriaSelect.innerHTML = '<option>Seleccione categoría primero</option>';
			return;
		}	

        subcategoriaSelect.innerHTML = '<option>Cargando...</option>';

        fetch(`/ajax/subcategorias/?categoria_id=${categoriaId}`)
            .then(response => response.json())
            .then(data => {

                subcategoriaSelect.innerHTML = '<option value="">Seleccione</option>';

                data.forEach(function (item) {
                    let option = document.createElement('option');
                    option.value = item.id;
                    option.text = item.nombre;
                    subcategoriaSelect.appendChild(option);
                });
            });
    }

    // 🔥 cuando cambia
    categoriaSelect.addEventListener('change', cargarSubcategorias);

    // 🔥 cuando carga la página (LA CLAVE)
    cargarSubcategorias();

});
</script>
</body>
</html>
